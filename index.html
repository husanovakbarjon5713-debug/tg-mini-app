<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Calc Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #f8fafc);
        }
    </style>
</head>
<body class="p-5 font-sans">

    <div class="max-w-md mx-auto bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-xl backdrop-blur-md">
        <h2 class="text-xl font-bold text-center mb-6 text-sky-400">📊 Target Metrikalar Kalkulyatori</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Sarflangan Byudjet ($)</label>
                <input type="number" id="budget" value="100" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-sky-500">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Kliklar soni (Clicks)</label>
                <input type="number" id="clicks" value="500" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-sky-500">
            </div>
        </div>

        <button onclick="calculateMetrics()" class="w-full mt-6 bg-sky-500 hover:bg-sky-600 text-white font-medium py-2.5 rounded-lg transition-all shadow-lg shadow-sky-500/20">
            Hisoblash
        </button>

        <div id="result-box" class="hidden mt-6 pt-6 border-t border-slate-700 space-y-3">
            <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-lg">
                <span class="text-sm text-slate-400">Klik narxi (CPC):</span>
                <span id="res-cpc" class="font-bold text-emerald-400">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        // Telegram Web Appni ishga tushiramiz
        const tg = window.Telegram.WebApp;
        tg.expand(); // Ilovani to'liq ekranga ochish

        // Ranglarni Telegram mavzusiga moslash
        document.body.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color);
        document.body.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color);

        function calculateMetrics() {
            const budget = parseFloat(document.getElementById('budget').value) || 0;
            const clicks = parseInt(document.getElementById('clicks').value) || 0;

            if (clicks === 0) {
                alert("Kliklar soni 0 bo'lishi mumkin emas!");
                return;
            }

            const cpc = budget / clicks;

            // Ekran yuzida natijani ko'rsatish
            document.getElementById('res-cpc').innerText = `$${cpc.toFixed(2)}`;
            document.getElementById('result-box').classList.remove('hidden');

            // Agar natijani bot chatiga xabar qilib yuborishni xohlasangiz:
            // Diqqat: Bu funksiya ilova "Keyboard Button" orqali ochilgandagina ishlaydi
            tg.sendData(JSON.stringify({ budget: budget, clicks: clicks, cpc: cpc.toFixed(2) }));
        }
    </script>
</body>
</html>
